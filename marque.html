<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MotoChiffrage Pro</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #080c14; color: #e6edf3; }

    .header { background: #0d1117; padding: 20px 40px; border-bottom: 1px solid #1a2332; display: flex; align-items: center; }
    .breadcrumb { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #484f58; }
    .breadcrumb a { color: #e94560; text-decoration: none; }

    .hero { background: linear-gradient(180deg, #0d1117, #080c14); padding: 40px 20px; text-align: center; border-bottom: 1px solid #1a2332; }
    .hero img { width: 120px; margin-bottom: 15px; }
    .hero h1 { font-size: 32px; font-weight: 800; color: #e6edf3; margin-bottom: 8px; }
    .hero p { color: #484f58; font-size: 14px; }

    .container { max-width: 900px; margin: 60px auto; padding: 0 20px; }
    .section-header { display: flex; align-items: center; gap: 15px; margin-bottom: 30px; }
    .section-header h2 { font-size: 12px; color: #484f58; text-transform: uppercase; letter-spacing: 2px; white-space: nowrap; }
    .section-line { flex: 1; height: 1px; background: #1a2332; }

    .cats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

    .cat-card {
      background: #0d1117;
      border: 1px solid #1a2332;
      border-radius: 16px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.3s;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
    }

    .cat-card:hover { border-color: #e94560; transform: translateY(-5px); box-shadow: 0 15px 40px rgba(233,69,96,0.15); }

    .cat-img-container {
      width: 100%;
      height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #080c14;
    }

    .cat-emoji { font-size: 100px; transition: transform 0.3s; }
    .cat-card:hover .cat-emoji { transform: scale(1.1) rotate(-5deg); }

    .cat-info { padding: 20px 25px 25px; border-top: 1px solid #1a2332; }
    .cat-name { font-size: 22px; font-weight: 800; color: #e6edf3; margin-bottom: 6px; }
    .cat-desc { font-size: 13px; color: #484f58; margin-bottom: 12px; }
    .cat-badge { font-size: 10px; padding: 3px 12px; border-radius: 10px; background: rgba(63,185,80,0.1); color: #3fb950; border: 1px solid rgba(63,185,80,0.3); display: inline-block; }

    .footer { text-align: center; padding: 30px; color: #484f58; font-size: 12px; border-top: 1px solid #1a2332; margin-top: 60px; }
  </style>
</head>
<body>

<div class="header">
  <div class="breadcrumb">
    <a href="index.html">Accueil</a>
    <span>›</span>
    <span style="color:#e6edf3" id="nom-marque">Marque</span>
  </div>
</div>

<div class="hero">
  <img id="logo-marque" src="" alt="">
  <h1 id="titre-marque">Marque</h1>
  <p>Pieces detachees officielles — Prix constructeur</p>
</div>

<div class="container">
  <div class="section-header">
    <h2>Choisissez une categorie</h2>
    <div class="section-line"></div>
  </div>

  <div class="cats-grid">
    <a id="lien-moto" href="#" class="cat-card">
      <div class="cat-img-container">
        <div class="cat-emoji">🏍️</div>
      </div>
      <div class="cat-info">
        <div class="cat-name">Moto</div>
        <div class="cat-desc" id="desc-moto">Toutes les motos</div>
        <span class="cat-badge" id="count-moto">Disponible</span>
      </div>
    </a>

    <div class="cat-card" style="opacity:0.5;cursor:default;">
      <div class="cat-img-container">
        <div class="cat-emoji">🛵</div>
      </div>
      <div class="cat-info">
        <div class="cat-name">Scooter</div>
        <div class="cat-desc">Bientot disponible</div>
        <span style="font-size:10px;padding:3px 12px;border-radius:10px;background:rgba(72,79,88,0.2);color:#484f58;border:1px solid #1a2332;display:inline-block;">Bientot</span>
      </div>
    </div>
  </div>

  <div style="margin-top:40px;">
    <div class="section-header">
      <h2 id="count-titre">Modeles disponibles</h2>
      <div class="section-line"></div>
    </div>

    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;" id="grid-modeles">
      <div style="color:#484f58;padding:20px;">Chargement...</div>
    </div>
  </div>
</div>

<div class="footer">MotoChiffrage Pro</div>

<script>
  var params = new URLSearchParams(window.location.search);
  var marque = params.get('marque') || 'honda';

  var logos = {
    'honda': 'https://fr.microfiches.net/thumbs/themes/micro/sites/200_200/Honda.webp',
    'kawasaki': 'https://fr.microfiches.net/thumbs/themes/micro/sites/200_200/kawasaki.webp',
    'suzuki': 'https://fr.microfiches.net/thumbs/themes/micro/sites/200_200/Suzuki.webp',
    'ducati': 'https://fr.microfiches.net/thumbs/themes/micro/sites/200_200/Ducati.webp',
    'bmw': 'https://fr.microfiches.net/thumbs/themes/micro/sites/200_200/BMW_moto.webp',
    'ktm': 'https://fr.microfiches.net/thumbs/themes/micro/sites/200_200/KTM.webp',
    'triumph': 'https://fr.microfiches.net/thumbs/themes/micro/sites/200_200/Triumph.webp',
    'aprilia': 'https://fr.microfiches.net/thumbs/themes/micro/sites/200_200/Aprilia.webp',
  };

  var nom = marque.charAt(0).toUpperCase() + marque.slice(1);
  document.getElementById('nom-marque').innerHTML = nom;
  document.getElementById('titre-marque').innerHTML = nom;
  document.getElementById('logo-marque').src = logos[marque] || '';
  document.getElementById('lien-moto').href = 'modeles.html?marque=' + marque + '&cat=moto';
  fetch('http://localhost:8080/api/catalogue?marque=' + marque)
    .then(function(r) { return r.json(); })
    .then(function(modeles) {
      document.getElementById('count-moto').innerHTML = modeles.length + ' modeles';
      document.getElementById('count-titre').innerHTML = modeles.length + ' modeles disponibles';

      var html = '';
      modeles.forEach(function(m) {
        html += '<div style="background:#0d1117;border:1px solid #1a2332;border-radius:10px;padding:12px;cursor:pointer;transition:all 0.2s;" onmouseover="this.style.borderColor=\'#e94560\'" onmouseout="this.style.borderColor=\'#1a2332\'">';
        html += '<div style="font-size:10px;color:#484f58;">' + m.cylindree + ' cc</div>';
        html += '<div style="font-size:15px;font-weight:bold;color:#e6edf3;">' + m.modele + '</div>';
        html += '<div style="font-size:11px;color:#58a6ff;">' + m.annee + '</div>';
        html += '</div>';
      });
      document.getElementById('grid-modeles').innerHTML = html;
    })
    .catch(function() {
      document.getElementById('grid-modeles').innerHTML = '<div style="color:#484f58">API non disponible</div>';
    });
</script>

</body>
</html>
