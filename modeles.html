<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modeles - MotoChiffrage Pro</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #080c14; color: #e6edf3; }

    .header { background: #0d1117; padding: 20px 40px; border-bottom: 1px solid #1a2332; display: flex; align-items: center; }
    .breadcrumb { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #484f58; }
    .breadcrumb a { color: #e94560; text-decoration: none; }

    .hero { background: linear-gradient(180deg, #0d1117, #080c14); padding: 30px 20px; text-align: center; border-bottom: 1px solid #1a2332; }
    .hero h1 { font-size: 28px; font-weight: 800; color: #e6edf3; margin-bottom: 8px; }
    .hero p { color: #484f58; font-size: 14px; }

    .filters { background: #0d1117; padding: 15px 40px; border-bottom: 1px solid #1a2332; display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    .filter-input { padding: 8px 15px; background: #080c14; border: 1px solid #1a2332; border-radius: 20px; color: #e6edf3; font-size: 13px; outline: none; width: 200px; }
    .filter-input:focus { border-color: #e94560; }
    .filter-input::placeholder { color: #484f58; }

    .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }

    .section-header { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
    .section-header h2 { font-size: 12px; color: #484f58; text-transform: uppercase; letter-spacing: 2px; white-space: nowrap; }
    .section-line { flex: 1; height: 1px; background: #1a2332; }

    .models-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; margin-bottom: 50px; }

    .model-card { background: #0d1117; border: 1px solid #1a2332; border-radius: 12px; padding: 20px 15px; cursor: pointer; transition: all 0.3s; display: block; position: relative; overflow: hidden; }
    .model-card::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 2px; background: #e94560; transform: scaleX(0); transition: transform 0.3s; }
    .model-card:hover::after { transform: scaleX(1); }
    .model-card:hover { border-color: #e94560; transform: translateY(-3px); box-shadow: 0 8px 20px rgba(233,69,96,0.1); }

    .model-cc { font-size: 10px; color: #484f58; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
    .model-name { font-size: 18px; font-weight: 800; color: #e6edf3; margin-bottom: 4px; }
    .model-annee { font-size: 12px; color: #58a6ff; margin-bottom: 12px; }
    .model-badge { font-size: 9px; padding: 2px 8px; border-radius: 8px; display: inline-block; background: rgba(72,79,88,0.2); color: #484f58; border: 1px solid #1a2332; }

    .loading { text-align: center; color: #484f58; padding: 60px; font-size: 14px; }

    .footer { text-align: center; padding: 30px; color: #484f58; font-size: 12px; border-top: 1px solid #1a2332; }
  </style>
</head>
<body>

<div class="header">
  <div class="breadcrumb">
    <a href="index.html">Accueil</a>
    <span>›</span>
    <a href="#" id="lien-marque">Marque</a>
    <span>›</span>
    <span style="color:#e6edf3" id="titre-cat">Moto</span>
  </div>
</div>

<div class="hero">
  <h1 id="titre-page">Modeles</h1>
  <p id="sous-titre">Selectionnez votre modele</p>
</div>

<div class="filters">
  <input class="filter-input" type="text" placeholder="Rechercher..." oninput="filtrer(this.value)" id="search">
</div>

<div class="container">
  <div class="section-header">
    <h2 id="count-label">Chargement...</h2>
    <div class="section-line"></div>
  </div>

  <div class="models-grid" id="grid-modeles">
    <div class="loading">Chargement des modeles...</div>
  </div>
</div>

<div class="footer">MotoChiffrage Pro</div>

<script>
  var params = new URLSearchParams(window.location.search);
  var marque = params.get('marque') || 'yamaha';
  var cat = params.get('cat') || 'moto';

  var nom = marque.charAt(0).toUpperCase() + marque.slice(1);
  document.getElementById('lien-marque').href = 'marque.html?marque=' + marque;
  document.getElementById('lien-marque').innerHTML = nom;
  document.getElementById('titre-cat').innerHTML = cat.charAt(0).toUpperCase() + cat.slice(1);
  document.getElementById('titre-page').innerHTML = '🏍️ ' + nom + ' — ' + cat.charAt(0).toUpperCase() + cat.slice(1);

  var tousModeles = [];

  fetch('http://localhost:8080/api/catalogue?marque=' + marque)
    .then(function(r) { return r.json(); })
    .then(function(modeles) {
      tousModeles = modeles;
      afficher(modeles);
    })
    .catch(function() {
      document.getElementById('grid-modeles').innerHTML = '<div class="loading">API non disponible</div>';
    });

  function afficher(liste) {
    document.getElementById('count-label').innerHTML = liste.length + ' modeles';
    if (liste.length === 0) {
      document.getElementById('grid-modeles').innerHTML = '<div class="loading">Aucun modele trouve</div>';
      return;
    }
    var html = '';
    liste.forEach(function(m) {
      var isR1 = marque === 'yamaha' && m.modele === 'R1' && m.annee === '2020';
      html += '<div class="model-card" onclick="window.location=\'yamaha-r1-2020.html\'">';
      html += '<div class="model-cc">' + m.cylindree + ' cc</div>';
      html += '<div class="model-name">' + m.modele + '</div>';
      html += '<div class="model-annee">' + m.annee + '</div>';
      if (isR1) {
        html += '<span class="model-badge" style="background:rgba(63,185,80,0.1);color:#3fb950;border:1px solid rgba(63,185,80,0.3);">✓ Disponible</span>';
      } else {
        html += '<span class="model-badge">Bientot</span>';
      }
      html += '</div>';
    });
    document.getElementById('grid-modeles').innerHTML = html;
  }

  function filtrer(val) {
    var res = tousModeles.filter(function(m) {
      return (m.modele + ' ' + m.annee + ' ' + m.cylindree).toLowerCase().includes(val.toLowerCase());
    });
    afficher(res);
  }
</script>

</body>
</html>
