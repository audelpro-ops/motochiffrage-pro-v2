<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Yamaha R1 - Vue 3D</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #080c14; color: #e6edf3; font-family: Arial, sans-serif; overflow: hidden; }
    canvas { width: 100vw; height: 100vh; display: block; }
    .ui { position: fixed; top: 20px; left: 20px; z-index: 100; }
    .ui h1 { font-size: 20px; color: #e94560; margin-bottom: 5px; }
    .ui p { font-size: 12px; color: #58a6ff; }
    .back { position: fixed; top: 20px; right: 20px; background: #e94560; color: white; padding: 8px 16px; border-radius: 20px; text-decoration: none; font-size: 13px; }
  </style>
</head>
<body>

<div class="ui">
  <h1>Yamaha YZF-R1 2020</h1>
  <p>Chargement du modele 3D...</p>
</div>

<a href="yamaha-r1-2020.html" class="back">Retour chiffrage</a>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script>

  var scene = new THREE.Scene();
  scene.background = new THREE.Color(0x080c14);

  var camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
  camera.position.set(0, 1, 5);

  var renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  scene.add(new THREE.AmbientLight(0xffffff, 0.8));
  var dir = new THREE.DirectionalLight(0xffffff, 1);
  dir.position.set(5, 10, 5);
  scene.add(dir);

  var loader = new THREE.GLTFLoader();
  loader.load('yamaha_r1.glb',
    function(gltf) {
      var moto = gltf.scene;
      var box = new THREE.Box3().setFromObject(moto);
      var center = box.getCenter(new THREE.Vector3());
      var size = box.getSize(new THREE.Vector3());
      var scale = 3 / Math.max(size.x, size.y, size.z);
      moto.scale.setScalar(scale);
      moto.position.sub(center.multiplyScalar(scale));
      scene.add(moto);
      document.querySelector('.ui p').innerHTML = 'Clic gauche : tourner | Molette : zoom';
    },
    function(xhr) {
      var pct = Math.round(xhr.loaded / xhr.total * 100);
      document.querySelector('.ui p').innerHTML = 'Chargement... ' + pct + '%';
    },
    function(err) {
      document.querySelector('.ui p').innerHTML = 'Erreur : ' + err.message;
    }
  );

  var drag = false;
  var prev = {x:0, y:0};
  var rotY = 0, rotX = 0;
  var zoom = 5;

  document.addEventListener('mousedown', function(e) { drag = true; prev = {x:e.clientX, y:e.clientY}; });
  document.addEventListener('mouseup', function() { drag = false; });
  document.addEventListener('mousemove', function(e) {
    if (!drag) return;
    rotY += (e.clientX - prev.x) * 0.01;
    rotX += (e.clientY - prev.y) * 0.01;
    rotX = Math.max(-1.2, Math.min(1.2, rotX));
    prev = {x:e.clientX, y:e.clientY};
  });
  document.addEventListener('wheel', function(e) {
    zoom += e.deltaY * 0.005;
    zoom = Math.max(1, Math.min(15, zoom));
  });
  window.addEventListener('resize', function() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  function animate() {
    requestAnimationFrame(animate);
    camera.position.x = zoom * Math.sin(rotY) * Math.cos(rotX);
    camera.position.y = zoom * Math.sin(rotX);
    camera.position.z = zoom * Math.cos(rotY) * Math.cos(rotX);
    camera.lookAt(0, 0, 0);
    renderer.render(scene, camera);
  }
  animate();
</script>
</body>
</html>
