<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yamaha Moto - MotoChiffrage Pro</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #080c14; color: #e6edf3; }

    .header { background: #0d1117; padding: 20px 40px; border-bottom: 1px solid #1a2332; display: flex; align-items: center; gap: 20px; }
    .breadcrumb { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #484f58; }
    .breadcrumb a { color: #e94560; text-decoration: none; }
    .breadcrumb span { color: #484f58; }

    .hero { background: linear-gradient(180deg, #0d1117, #080c14); padding: 40px 20px; text-align: center; border-bottom: 1px solid #1a2332; }
    .hero h1 { font-size: 32px; font-weight: 800; color: #e6edf3; margin-bottom: 8px; }
    .hero p { color: #484f58; font-size: 14px; }

    .filters { background: #0d1117; padding: 15px 40px; border-bottom: 1px solid #1a2332; display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    .filter-input { padding: 8px 15px; background: #080c14; border: 1px solid #1a2332; border-radius: 20px; color: #e6edf3; font-size: 13px; outline: none; width: 200px; }
    .filter-input:focus { border-color: #e94560; }
    .filter-input::placeholder { color: #484f58; }
    .btn-filter { padding: 8px 16px; background: #080c14; border: 1px solid #1a2332; border-radius: 20px; color: #484f58; font-size: 12px; cursor: pointer; transition: all 0.2s; }
    .btn-filter:hover, .btn-filter.active { background: #e94560; color: white; border-color: #e94560; }

    .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }

    .section-header { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
    .section-header h2 { font-size: 12px; color: #484f58; text-transform: uppercase; letter-spacing: 2px; white-space: nowrap; }
    .section-line { flex: 1; height: 1px; background: #1a2332; }

    .models-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; margin-bottom: 50px; }

    .model-card { background: #0d1117; border: 1px solid #1a2332; border-radius: 12px; padding: 20px 15px; cursor: pointer; transition: all 0.3s; text-decoration: none; color: inherit; display: block; position: relative; overflow: hidden; }
    .model-card::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 2px; background: #e94560; transform: scaleX(0); transition: transform 0.3s; }
    .model-card:hover::after { transform: scaleX(1); }
    .model-card:hover { border-color: #e94560; transform: translateY(-3px); box-shadow: 0 8px 20px rgba(233,69,96,0.1); }
    .model-card.available { border-color: rgba(63,185,80,0.3); }
    .model-card.available::after { background: #3fb950; }
    .model-card.available:hover { border-color: #3fb950; box-shadow: 0 8px 20px rgba(63,185,80,0.1); }

    .model-type { font-size: 10px; color: #484f58; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
    .model-name { font-size: 20px; font-weight: 800; color: #e6edf3; margin-bottom: 4px; }
    .model-cc { font-size: 12px; color: #58a6ff; margin-bottom: 15px; }
    .model-badge { font-size: 9px; padding: 2px 8px; border-radius: 8px; display: inline-block; }
    .badge-ok { background: rgba(63,185,80,0.1); color: #3fb950; border: 1px solid rgba(63,185,80,0.3); }
    .badge-soon { background: rgba(72,79,88,0.2); color: #484f58; border: 1px solid #1a2332; }

    .loading { text-align: center; color: #484f58; padding: 40px; font-size: 14px; }

    .footer { text-align: center; padding: 30px; color: #484f58; font-size: 12px; border-top: 1px solid #1a2332; }
  </style>
</head>
<body>

<div class="header">
  <div class="breadcrumb">
    <a href="index.html">Accueil</a><span>›</span>
    <a href="yamaha.html">Yamaha</a><span>›</span>
    <span style="color:#e6edf3">Moto</span>
  </div>
</div>

<div class="hero">
  <h1>🏍️ Yamaha Moto</h1>
  <p>Selectionnez votre modele pour acceder au catalogue de pieces</p>
</div>

<div class="filters">
  <input class="filter-input" type="text" placeholder="Rechercher..." oninput="filtrer(this.value)" id="search">
  <button class="btn-filter active" onclick="filtrerType('tous', this)">Tous</button>
  <button class="btn-filter" onclick="filtrerType('R', this)">Sport R</button>
  <button class="btn-filter" onclick="filtrerType('MT', this)">MT</button>
  <button class="btn-filter" onclick="filtrerType('TENERE', this)">Tenere</button>
  <button class="btn-filter" onclick="filtrerType('XSR', this)">XSR</button>
  <button class="btn-filter" onclick="filtrerType('FZ', this)">FZ</button>
  <button class="btn-filter" onclick="filtrerType('YZ', this)">YZ</button>
</div>

<div class="container">

  <div class="section-header">
    <h2>✅ Disponible</h2>
    <div class="section-line"></div>
  </div>

  <div class="models-grid">
    <a href="yamaha-r1-2020.html" class="model-card available">
      <img src="https://www.pieces-yam.com/thumbs/y/pictures/300_300/2020-Yamaha-YZF1000-R1-B3L1-EU-Icon_Blue.webp" style="width:100%;height:100px;object-fit:contain;margin-bottom:10px;">
      <div class="model-type">Supersport · 1000 cc</div>
      <div class="model-name">YZF-R1</div>
      <div class="model-cc">2020 · 197 ch</div>
      <span class="model-badge badge-ok">✓ 1458 pieces</span>
    </a>
  </div>

  <div class="section-header">
    <h2>📦 Catalogue complet</h2>
    <div class="section-line"></div>
  </div>

  <div class="models-grid" id="grid-modeles">
    <div class="loading">Chargement des modeles...</div>
  </div>

</div>

<div class="footer">MotoChiffrage Pro — Yamaha Moto</div>

<script>
  var tousModeles = [];

  fetch('http://localhost:8080/api/catalogue')
    .then(function(r) { return r.json(); })
    .then(function(modeles) {
      tousModeles = modeles;
      afficherModeles(modeles);
    })
    .catch(function() {
      document.getElementById('grid-modeles').innerHTML = '<div class="loading">API non disponible</div>';
    });

  function afficherModeles(modeles) {
    var grid = document.getElementById('grid-modeles');
    if (modeles.length === 0) {
      grid.innerHTML = '<div class="loading">Aucun modele trouve</div>';
      return;
    }
    var html = '';
    modeles.forEach(function(m) {
      var isR1 = m.modele === 'R1' && m.annee === '2020';
      var classe = isR1 ? 'model-card available' : 'model-card';
      var lien = isR1 ? 'yamaha-r1-2020.html' : 'yamaha-r1-2020.html';
      html += '<div class="' + classe + '" onclick="window.location=\'' + lien + '\'">';
      html += '<div class="model-type">' + m.cylindree + ' cc</div>';
      html += '<div class="model-name">' + m.modele + '</div>';
      html += '<div class="model-cc">' + m.annee + '</div>';
      if (isR1) {
        html += '<span class="model-badge badge-ok">✓ Disponible</span>';
      } else {
        html += '<span class="model-badge badge-soon">Bientot</span>';
      }
      html += '</div>';
    });
    grid.innerHTML = html;
  }

  function filtrer(val) {
    var res = tousModeles.filter(function(m) {
      return (m.modele + ' ' + m.annee + ' ' + m.cylindree).toLowerCase().includes(val.toLowerCase());
    });
    afficherModeles(res);
  }

  function filtrerType(type, btn) {
    document.querySelectorAll('.btn-filter').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    document.getElementById('search').value = '';
    if (type === 'tous') {
      afficherModeles(tousModeles);
    } else {
      var res = tousModeles.filter(function(m) {
        return m.modele.toUpperCase().includes(type.toUpperCase());
      });
      afficherModeles(res);
    }
  }
</script>

</body>
</html>
